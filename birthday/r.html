<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎂</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
}

/* Container */
.container {
  background: rgba(255,255,255,0.95);
  padding: 20px;
  width: 90%;
  max-width: 420px;
  margin: 40px auto;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
  color: #ff4081;
}

/* Button */
button {
  background: linear-gradient(45deg, #ff4081, #7c4dff);
  color: white;
  border: none;
  padding: 12px 25px;
  border-radius: 25px;
  font-size: 15px;
  cursor: pointer;
  margin-top: 15px;
}

/* Story */
.story {
  display: none;
  margin-top: 20px;
}

/* Progress */
.progress {
  height: 5px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff4081, #7c4dff);
}

/* GIF */
.story img {
  width: 80%;
  max-width: 250px;
  border-radius: 15px;
  display: block;
  margin: 10px auto;
}

/* FINAL */
.final-screen {
  display: none;
  margin-top: 20px;
}

/* Typing text */
#typedText {
  font-size: 16px;
  margin-bottom: 10px;
  line-height: 1.6;
  min-height: 50px;
}

/* Image */
.custom-image {
  width: 75%;
  max-width: 220px;
  border-radius: 15px;
  display: block;
  margin: 10px auto;
}

/* Highlight */
.highlight {
  font-size: 18px;
  font-weight: bold;
  color: #ff4081;
  margin-top: 10px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
let index = 0;

const gifs = [
  "https://media.tenor.com/mz5oTW6Y2roAAAAM/birthday-bday.gif",
  "https://media.tenor.com/x4LzWwfdoYoAAAAM/cake-face.gif",
  "https://media.tenor.com/GgLwolFoG0sAAAAM/rat-dance.gif"
];

function startStory() {
  document.getElementById("story").style.display = "block";
  showSlide();
  confettiEffect();
  playMusic();
}

function showSlide() {
  const gif = document.getElementById("gif");

  if (index < gifs.length) {
    gif.src = gifs[index];
    updateProgress();

    setTimeout(() => {
      index++;
      showSlide();
    }, 3000);
  } else {
    document.getElementById("story").style.display = "none";
    document.getElementById("finalScreen").style.display = "block";
    typeMessage();
  }
}

function nextSlide() {
  if (index < gifs.length - 1) {
    index++;
    showSlide();
  }
}

function updateProgress() {
  document.getElementById("bar").style.width =
    ((index + 1) / gifs.length) * 100 + "%";
}

function confettiEffect() {
  confetti({ particleCount: 120, spread: 70 });
}

function playMusic() {
  document.getElementById("song").play();
}

/* 🔥 Typing Effect */
const text = "Happy Birthday cutie foodie edur 🤣\n(sorry ar cha kharap photo chilo na 🥲)";
let i = 0;

function typeMessage() {
  const el = document.getElementById("typedText");

  if (i < text.length) {
    if (text[i] === "\n") {
      el.innerHTML += "<br>";
    } else {
      el.innerHTML += text[i];
    }
    i++;
    setTimeout(typeMessage, 40);
  }
}
</script>

</head>

<body>

<div class="container">
  <h1>🎀 Happy Birthday 🎂</h1>
  <p>You deserve the best day ever 💖</p>

  <button onclick="startStory()">Start Surprise 🎁</button>

  <!-- STORY -->
  <div class="story" id="story">
    <div class="progress">
      <div class="progress-bar" id="bar"></div>
    </div>

    <img id="gif" src="">
    <button onclick="nextSlide()">Next ➡️</button>
  </div>

  <!-- FINAL -->
  <div class="final-screen" id="finalScreen">
    <h2>💖 One Last Surprise...</h2>

    <!-- Typing text -->
    <p id="typedText"></p>

    <!-- Image -->
    <img src="WhatsApp Image 2026-03-22 at 20.58.30.jpeg" class="custom-image">

    <p class="highlight">Happy Birthday 🎂💖</p>
  </div>
</div>

<audio id="song" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

</body>
</html>
